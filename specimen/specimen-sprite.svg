</symbol>

<symbol id="spec-grid" viewBox="0 0 100 100">
  <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M30 90 L43 16 L57 16 L70 90"/>
    <path d="M22 22 L78 22 M26 30 L74 30"/>
    <path d="M35 56 L65 68 M65 56 L35 68 M39 38 L61 48 M61 38 L39 48"/>
    <path d="M28 22 L28 27 M50 22 L50 16 M72 22 L72 27"/>
  </g>
</symbol>

<symbol id="spec-house" viewBox="0 0 100 100">
  <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 80 L22 46 L50 24 L78 46 L78 80 Z" style="fill:var(--specimen-wash-petrol,rgba(46,94,91,.08))"/>
