<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
<!-- Pipelet "Naturalist" domain specimens: fine-line, single-stroke.
     Stroke uses currentColor (themed via the .specimen color token); each body
     carries one muted wash (with an rgba fallback so it also renders outside the
     naturalist theme). Uniform viewBox 0 0 100 100. Canonical home:
     pipelet-shared-ui/specimen/ (promote + sync); this copy is the served asset. -->

<symbol id="spec-wallbox" viewBox="0 0 100 100">
  <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="29" y="16" width="42" height="68" rx="7" style="fill:var(--specimen-wash-petrol,rgba(46,94,91,.10))"/>
    <rect x="37" y="25" width="26" height="13" rx="2"/>
    <circle cx="47" cy="59" r="9"/>
    <circle cx="44" cy="56" r="1.3" fill="currentColor" stroke="none"/>
    <circle cx="50" cy="56" r="1.3" fill="currentColor" stroke="none"/>
    <circle cx="47" cy="62" r="1.3" fill="currentColor" stroke="none"/>
    <path d="M71 50 C83 54 83 72 74 80"/>
  </g>
</symbol>

<symbol id="spec-hpc" viewBox="0 0 100 100">
  <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="24" y="8" width="52" height="84" rx="8" style="fill:var(--specimen-wash-rust,rgba(155,59,34,.09))"/>
    <rect x="33" y="18" width="34" height="22" rx="2"/>
    <path d="M24 56 C10 62 10 80 20 86 M76 56 C90 62 90 80 80 86"/>
    <path d="M47 48 L41 62 L51 62 L45 76" stroke-width="2"/>
  </g>
</symbol>

<symbol id="spec-connector-type2" viewBox="0 0 100 100">
  <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M34 40 A20 20 0 1 0 66 40 Z" style="fill:var(--specimen-wash-sepia,rgba(106,90,67,.08))"/>
    <circle cx="50" cy="48" r="20"/>
    <circle cx="43" cy="41" r="2.4"/><circle cx="57" cy="41" r="2.4"/>
    <circle cx="40" cy="51" r="3"/><circle cx="60" cy="51" r="3"/>
    <circle cx="50" cy="58" r="2.4"/>
    <path d="M50 68 L50 86"/>
  </g>
</symbol>

<symbol id="spec-pv" viewBox="0 0 100 100">
  <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M16 50 L76 34 L90 48 L30 64 Z" style="fill:var(--specimen-wash-ochre,rgba(154,107,22,.10))"/>
    <path d="M36 45 L50 58 M56 41 L70 54 M26 55 L84 39"/>
    <path d="M48 61 L44 84 M70 54 L74 80"/>
  </g>
</symbol>

<symbol id="spec-battery" viewBox="0 0 100 100">
  <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="22" y="34" width="56" height="44" rx="5" style="fill:var(--specimen-wash-green,rgba(92,115,73,.11))"/>
    <rect x="32" y="28" width="9" height="6" rx="1"/>
    <rect x="59" y="28" width="9" height="6" rx="1"/>
    <path d="M48 44 L42 56 L50 56 L44 68" stroke-width="2"/>
    <path d="M62 50 L70 50 M66 46 L66 54"/>
  </g>
</symbol>

<symbol id="spec-meter" viewBox="0 0 100 100">
  <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="28" y="22" width="44" height="56" rx="5" style="fill:var(--specimen-wash-sepia,rgba(106,90,67,.08))"/>
    <rect x="36" y="30" width="28" height="14" rx="1.5"/>
    <circle cx="41" cy="62" r="5"/><circle cx="59" cy="62" r="5"/>
    <path d="M41 62 L41 58 M59 62 L62 62"/>
