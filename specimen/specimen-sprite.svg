<symbol id="spec-leaf" viewBox="0 0 100 100">
  <g fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M50 80 C28 66 28 34 50 20 C72 34 72 66 50 80 Z" style="fill:var(--specimen-wash-green,rgba(92,115,73,.11))"/>
    <path d="M50 80 L50 24 M50 40 L38 32 M50 40 L62 32 M50 54 L36 48 M50 54 L64 48 M50 66 L39 62 M50 66 L61 62"/>
  </g>
</symbol>
</svg>
